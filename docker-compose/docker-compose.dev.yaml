services:
  app:
    container_name: suivi-bourse-app
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
    - SB_SCRAPING_INTERVAL=60
    - SB_INGESTION_INTERVAL=30
    - SB_BACKFILL_INTERVAL=30
    - SB_BACKFILL_DELAY=5
    - SB_BACKFILL_CHUNK_DAYS=365
    - LOG_LEVEL=DEBUG
    - SB_CONFIG_MODE=${SB_CONFIG_MODE:-events}
    - INFLUXDB_HOST=http://influxdb:8181
    - INFLUXDB_DATABASE=${INFLUXDB_DATABASE:-suivi_bourse}
    # No token needed - auth disabled in dev
    build: ../app
    restart: unless-stopped
    volumes:
    - ./config.yaml:/home/appuser/.config/SuiviBourse/config.yaml:ro
    - ./events:/home/appuser/.config/SuiviBourse/events:ro
    - ./settings.yaml:/home/appuser/.config/SuiviBourse/settings.yaml:ro
    develop:
      watch:
        - action: rebuild
          path: ../app/src
        - action: rebuild
          path: ../app/requirements.txt
  grafana:
    container_name: suivi-bourse-graf
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
    - GF_SECURITY_ADMIN_PASSWORD=admin
    image: grafana/grafana:12.3.2
    ports:
    - 3000:3000
    restart: unless-stopped
    volumes:
    - ./grafana_provisioning:/etc/grafana/provisioning
    develop:
      watch:
        - action: sync+restart
          path: ./grafana_provisioning
          target: /etc/grafana/provisioning
  influxdb:
    container_name: suivi-bourse-influxdb
    image: influxdb:3-core
    entrypoint: ["/bin/bash", "/init.sh"]
    environment:
    - INFLUXDB3_NODE_ID=suivi-bourse-dev
    - INFLUXDB3_DATABASE=${INFLUXDB_DATABASE:-suivi_bourse}
    - INFLUXDB3_DATA_DIR=/var/lib/influxdb3
    - INFLUXDB3_WITHOUT_AUTH=true
    ports:
    - 8181:8181
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
    - sb_influxdb_data:/var/lib/influxdb3
    - ./influxdb3-init.sh:/init.sh:ro
  docs:
    container_name: suivi-bourse-docs
    build: ../website
    ports:
    - 4000:80
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ../website/docs
        - action: rebuild
          path: ../website/src
        - action: rebuild
          path: ../website/docusaurus.config.js
volumes:
  sb_influxdb_data:
    driver: local
