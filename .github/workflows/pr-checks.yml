name: "Pull request checks"
on:
  pull_request:
    branches: [master]

# Least privilege: these jobs only read the checkout; no writes to the repo.
permissions:
  contents: read

jobs:
  python-linter:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: ricardochaves/python-lint@v1.4.0
        with:
          python-root-list: "app/src/"
          use-pycodestyle: false
          use-pylint: false
          use-black: false
          use-mypy: false
          use-isort: false
          extra-flake8-options: "--ignore=E501"

  unit-test:
    name: "Unit Test"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - run: cd app && uv run pytest tests/

  build-docs:
    name: "Building doc"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Get changed files in the docs folder
        id: changed-files-specific
        uses: tj-actions/changed-files@v47
        with:
          files: |
            website/**
      - name: Install pnpm
        if: steps.changed-files-specific.outputs.any_changed == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - name: Set up Node.js
        if: steps.changed-files-specific.outputs.any_changed == 'true'
        uses: actions/setup-node@v6
        with:
          # pnpm 11.9 requires node:sqlite (Node >= 22.5)
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Build docs if folder changed
        if: steps.changed-files-specific.outputs.any_changed == 'true'
        working-directory: website
        run: |
          pnpm install --frozen-lockfile
          pnpm build
